AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Fluxy — personal finance API. Lambda (arm64) behind an HTTP API, talking to a
  Neon (PostgreSQL serverless) database over the Neon HTTP driver (HTTPS). The
  Lambda is OUTSIDE any VPC, so there is no NAT Gateway and no RDS/VPC resources.
  See specs/0002-arquitetura-tecnica.md.

Parameters:
  Stage:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
  DbName:
    Type: String
    Default: fluxy
  AppUrl:
    Type: String
    Default: http://localhost:3000
    Description: Web app origin (CORS and e-mail links).
  EmailFrom:
    Type: String
    Default: Fluxy <onboarding@resend.dev>
  JwtSecretParam:
    Type: String
    Default: /fluxy/dev/jwt-secret
    Description: >
      Name of a pre-created SSM SecureString parameter holding the JWT signing
      secret. Must live under /fluxy/<stage>/ (see IAM below). CloudFormation
      cannot create SecureString parameters, so create it manually:
      aws ssm put-parameter --name /fluxy/dev/jwt-secret --type SecureString --value <secret>
  DatabaseUrlParam:
    Type: String
    Default: /fluxy/dev/database-url
    Description: >
      Name of a pre-created SSM SecureString parameter holding the Neon connection
      string. Must live under /fluxy/<stage>/. Create it manually:
      aws ssm put-parameter --name /fluxy/dev/database-url --type SecureString --value <neon-url>
  ResendApiKeyParam:
    Type: String
    Default: /fluxy/dev/resend-api-key
    Description: >
      Name of a pre-created SSM SecureString parameter holding the Resend API key.
      Optional — without it the app logs e-mails instead of sending them.

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 512

Resources:
  # The database lives in Neon (serverless Postgres, outside AWS), reached over
  # HTTPS by the Neon HTTP driver. No VPC, RDS, NAT or Secrets Manager here — the
  # connection string is held in SSM (DatabaseUrlParam). See AD-7/8/9/13.

  # --- HTTP API (cheaper than REST API) ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Default ($default) stage — the invoke URL is the bare ApiEndpoint.
      Description: !Sub 'Fluxy API (${Stage})'

  # --- API Lambda: runs the whole Fastify app; OUTSIDE the VPC ---
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: lambda.handler
      Environment:
        Variables:
          STAGE: !Ref Stage
          NODE_ENV: production
          APP_URL: !Ref AppUrl
          EMAIL_FROM: !Ref EmailFrom
          DB_NAME: !Ref DbName
          DATABASE_URL_PARAM: !Ref DatabaseUrlParam
          JWT_SECRET_PARAM: !Ref JwtSecretParam
          RESEND_API_KEY_PARAM: !Ref ResendApiKeyParam
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fluxy/${Stage}/*'
      Events:
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: Base URL of the HTTP API
    Value: !GetAtt HttpApi.ApiEndpoint
  DbName:
    Description: Database name
    Value: !Ref DbName
