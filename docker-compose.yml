# Local development database for Fluxy (0002/AD-15: migrations run against this
# Docker Postgres locally; deployed stages use Neon). Start with:
#   docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: fluxy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluxy
    ports:
      - "5432:5432"
    volumes:
      - fluxy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluxy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fluxy_pgdata:
